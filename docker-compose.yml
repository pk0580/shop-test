services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: shop_php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    networks:
      - shop_network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}

  nginx:
    image: nginx:1.26-alpine
    container_name: shop_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shop_network
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: shop_db
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-shop}
      MYSQL_USER: ${DB_USERNAME:-shop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - shop_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  shop_network:
    driver: bridge

volumes:
  db_data:
    driver: local
